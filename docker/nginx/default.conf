upstream django_upstream {
  server backend:8000;
  keepalive 32;
}

server {
  listen 80;
  listen [::]:80;
  server_name sktagency.pro www.sktagency.pro;

  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  location / {
    return 301 https://sktagency.pro$request_uri;
  }
}

server {
  listen 443 ssl;
  listen [::]:443 ssl;
  http2 on;
  server_name www.sktagency.pro;

  ssl_certificate /etc/nginx/ssl/fullchain.pem;
  ssl_certificate_key /etc/nginx/ssl/privkey.pem;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_prefer_server_ciphers off;

  return 301 https://sktagency.pro$request_uri;
}

server {
  listen 443 ssl;
  listen [::]:443 ssl;
  http2 on;
  server_name sktagency.pro;

  ssl_certificate /etc/nginx/ssl/fullchain.pem;
  ssl_certificate_key /etc/nginx/ssl/privkey.pem;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_prefer_server_ciphers off;

  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

  client_max_body_size 20m;

  location /static/ {
    alias /var/www/static/;
    access_log off;
    expires 30d;
    add_header Cache-Control "public, max-age=2592000, immutable";
  }

  location /media/ {
    alias /var/www/media/;
    access_log off;
    expires 7d;
    add_header Cache-Control "public, max-age=604800";
  }

  location /api/ {
    proxy_pass http://django_upstream;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_read_timeout 120;
  }

  location /admin/ {
    proxy_pass http://django_upstream;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_read_timeout 120;
  }

  location ~* ^/(?:swagger|swagger\\.json|openapi|graphql|phpinfo|info\\.php|test\\.php|server-info|debug\\.log|error\\.log|_profiler|horizon|storage|aws|backend/config|config)/ {
    return 404;
  }

  location ~ /\.(?!well-known) {
    return 404;
  }

  location ~* \.(?:env|ini|yml|yaml|log|sql|bak|old|swp|dist|lock)$ {
    return 404;
  }

  location / {
    root /usr/share/nginx/html;
    try_files $uri $uri/ /index.html;
  }
}
